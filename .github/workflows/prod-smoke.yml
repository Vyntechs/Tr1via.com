name: Prod smoke

# Runs zero-cost production health and browser checks automatically:
#   • After every push to main (waits for Vercel to deploy, then smokes)
#   • On-demand via "Run workflow" button on the Actions tab
# Paid Anthropic + Pexels generation runs only when a manual run explicitly
# opts in with run_paid_generation.
#
# Silence means green. If anything turns red GitHub emails the repo owner.
# That's the entire UX — Brandon never runs a check manually.
#
# One-time setup: add three secrets at Settings → Secrets and variables →
# Actions:
#   NEXT_PUBLIC_SUPABASE_URL     (e.g. https://citweuctcnuxmqjxcbiz.supabase.co)
#   SUPABASE_SERVICE_ROLE_KEY    (the prod key, NOT the anon key)
#   SMOKE_FOUNDER_EMAIL          (brandon@vyntechs.com)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_paid_generation:
        description: Run real Anthropic + Pexels generation (paid)
        required: true
        type: boolean
        default: false

concurrency:
  # Avoid stacking smokes if multiple pushes land close together. The
  # latest run wins; older queued ones get cancelled.
  group: prod-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deploy to settle (push trigger only)
        if: github.event_name == 'push'
        run: |
          # Vercel typically deploys in 30-60s. Poll the site's health for
          # up to 5 minutes before giving up. We hit a known route to
          # confirm the deploy is responding.
          for i in $(seq 1 30); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://tr1via.com/api/auth/founder-login -X POST -H "Content-Type: application/json" -d '{"email":"smoke-check@invalid.invalid"}')
            echo "[$i] health probe -> $CODE"
            # 404 = our route is live and correctly rejecting the non-founder email
            # 405 = method not allowed (route not deployed yet)
            # 500/502/503 = backend issue
            if [ "$CODE" = "404" ]; then echo "deploy live"; break; fi
            sleep 10
          done

      - name: API smoke (real Anthropic + Pexels + Supabase)
        if: github.event_name == 'workflow_dispatch' && inputs.run_paid_generation == true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_FOUNDER_EMAIL: ${{ secrets.SMOKE_FOUNDER_EMAIL }}
          SMOKE_BASE_URL: https://tr1via.com
          SMOKE_GEN_TIMEOUT_MS: 240000
        run: node scripts/prod-smoke.mjs "smoke check $(date +%s)"

      - name: UI smoke (real browser → tr1via.com)
        env:
          SMOKE_FOUNDER_EMAIL: ${{ secrets.SMOKE_FOUNDER_EMAIL }}
          SMOKE_BASE_URL: https://tr1via.com
        run: npx playwright test --config=playwright-prod.config.ts

      # Full game-night driver: 3 simulated phones, 2 games, ~14 reveals end
      # to end. ~80s green on prod. Catches the test-fixture/prod-divergence
      # bug class that bypassed seed-night this week: real /api/nights →
      # 'draft' state → /open → join → /start → reveal → /answers → resolve.
      # If this step turns red, a real player just hit a bug.
      # One theme pass and one category per game still drive all 14 reveals,
      # both game boundaries, three phones, scoring, and the leaderboard while
      # avoiding four expensive AI generations. Generation gets the same 4m
      # budget as the API smoke; the 12m step budget leaves room for two cold
      # verified generations plus the complete two-game arc and cleanup.
      - name: Full-flow driver (3 phones × 2 games, single theme pass)
        if: github.event_name == 'workflow_dispatch' && inputs.run_paid_generation == true
        timeout-minutes: 12
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMOKE_FOUNDER_EMAIL: ${{ secrets.SMOKE_FOUNDER_EMAIL }}
          SMOKE_BASE_URL: https://tr1via.com
          SMOKE_THEME_SINGLE: may
          CATEGORIES_PER_GAME: 1
          SMOKE_GEN_TIMEOUT_MS: 240000
        run: node scripts/full-flow-prod.mjs
